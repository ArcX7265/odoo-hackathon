<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TransitOps Dispatcher</title>
    <!-- Modern premium font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #09090b;
            --bg-gradient: radial-gradient(circle at top right, #1e1b4b, #09090b 50%),
                           radial-gradient(circle at bottom left, #0f172a, #09090b 50%);
            --panel-bg: rgba(24, 24, 27, 0.4);
            --panel-border: rgba(255, 255, 255, 0.08);
            --panel-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            
            --text-primary: #fafafa;
            --text-secondary: #a1a1aa;
            
            --accent-primary: #8b5cf6;
            --accent-secondary: #3b82f6;
            --accent-gradient: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            
            --error-color: #ef4444;
            --success-color: #10b981;
            
            --font-heading: 'Outfit', sans-serif;
            --font-body: 'Inter', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-body);
            background: var(--bg-gradient);
            background-color: var(--bg-color);
            background-attachment: fixed;
            color: var(--text-primary);
            min-height: 100vh;
            padding: 3rem 2rem;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
        }

        .dashboard-container {
            max-width: 1200px;
            width: 100%;
            animation: fadeIn 0.8s ease-out;
        }

        .dashboard-header {
            margin-bottom: 3rem;
            text-align: center;
            position: relative;
        }
        
        .dashboard-header::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 4px;
            background: var(--accent-gradient);
            border-radius: 4px;
        }

        .dashboard-header h1 {
            font-family: var(--font-heading);
            font-weight: 300;
            font-size: 3rem;
            letter-spacing: -0.02em;
        }

        .dashboard-header h1 span {
            font-weight: 700;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .dashboard-header p {
            color: var(--text-secondary);
            margin-top: 1rem;
            font-size: 1.15rem;
            font-weight: 400;
        }

        .dispatch-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2.5rem;
        }

        @media (min-width: 900px) {
            .dispatch-grid {
                grid-template-columns: 1.6fr 1fr;
            }
        }

        /* Glassmorphism Panel */
        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--panel-border);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: var(--panel-shadow);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .glass-panel::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            opacity: 0.5;
        }

        .glass-panel:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px -10px rgba(0, 0, 0, 0.5);
            border-color: rgba(255, 255, 255, 0.15);
        }

        h2 {
            font-family: var(--font-heading);
            font-size: 1.75rem;
            font-weight: 600;
            margin-bottom: 2rem;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        /* Form Styles */
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        @media (max-width: 600px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }

        .input-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .input-group input, .input-group select {
            width: 100%;
            padding: 1rem 1.25rem;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s ease;
            appearance: none;
        }

        .input-group select {
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23a1a1aa' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 1.25rem center;
            background-size: 1.2em;
            cursor: pointer;
        }

        .input-group select option {
            background: #18181b;
            color: #fafafa;
        }

        .input-group input:focus, .input-group select:focus {
            outline: none;
            border-color: var(--accent-primary);
            background: rgba(0, 0, 0, 0.4);
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.15);
        }

        .btn-primary {
            width: 100%;
            padding: 1.25rem;
            background: var(--accent-gradient);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            font-family: var(--font-heading);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-top: 1rem;
            position: relative;
            overflow: hidden;
        }

        .btn-primary::after {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }

        .btn-primary:hover:not(:disabled)::after {
            left: 100%;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(139, 92, 246, 0.5);
        }

        .btn-primary:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: not-allowed;
        }

        /* Warnings */
        .warning-text {
            color: var(--error-color);
            font-size: 0.85rem;
            margin-top: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            animation: slideInDown 0.3s ease;
            background: rgba(239, 68, 68, 0.1);
            padding: 0.5rem 0.75rem;
            border-radius: 8px;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .warning-text.hidden {
            display: none;
        }

        /* Progress Tracker */
        .progress-tracker {
            display: flex;
            flex-direction: column;
            padding-top: 1rem;
        }

        .step {
            display: flex;
            align-items: flex-start;
            gap: 1.5rem;
            opacity: 0.3;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .step.active, .step.completed {
            opacity: 1;
        }

        .step-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 1.25rem;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(0, 0, 0, 0.3);
            z-index: 2;
        }

        .step.active .step-icon {
            background: var(--accent-gradient);
            color: white;
            border-color: transparent;
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.4);
            transform: scale(1.1);
        }

        .step.completed .step-icon {
            background: var(--success-color);
            color: white;
            border-color: var(--success-color);
        }

        .step-text h4 {
            font-family: var(--font-heading);
            font-size: 1.35rem;
            font-weight: 500;
            margin-bottom: 0.35rem;
            color: var(--text-primary);
        }

        .step-text p {
            font-size: 0.95rem;
            color: var(--text-secondary);
        }

        .step-connector {
            width: 2px;
            height: 60px;
            background: rgba(255, 255, 255, 0.05);
            margin-left: 23px;
            margin-top: -5px;
            margin-bottom: -5px;
            transition: background 0.5s ease;
        }

        .step.completed + .step-connector {
            background: var(--success-color);
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.3);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes slideInDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <header class="dashboard-header">
            <h1>TransitOps <span>Dispatch Engine</span></h1>
            <p>Live Fleet Management Interface</p>
        </header>

        <main class="dispatch-grid">
            <!-- Left Column: Dispatch Form -->
            <section class="glass-panel form-section">
                <h2>New Trip Details</h2>
                <form id="dispatchForm">
                    <div class="form-row">
                        <div class="input-group">
                            <label for="source">Source Location</label>
                            <input type="text" id="source" required placeholder="Enter origin facility">
                        </div>
                        
                        <div class="input-group">
                            <label for="destination">Destination</label>
                            <input type="text" id="destination" required placeholder="Enter destination">
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="vehicleSelect">Assign Vehicle</label>
                        <select id="vehicleSelect" required>
                            <option value="" disabled selected>Loading available vehicles...</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label for="driverSelect">Assign Driver</label>
                        <select id="driverSelect" required>
                            <option value="" disabled selected>Loading available drivers...</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label for="cargoWeight">Cargo Weight (kg)</label>
                        <input type="number" id="cargoWeight" required placeholder="0" min="0">
                        <p id="capacityWarning" class="warning-text hidden">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"></path><path d="M12 9v4"></path><path d="M12 17h.01"></path></svg>
                            <span>Warning: Exceeds vehicle capacity!</span>
                        </p>
                    </div>

                    <button type="submit" id="dispatchBtn" class="btn-primary" disabled>Dispatch Trip</button>
                </form>
            </section>

            <!-- Right Column: Status Tracker -->
            <section class="glass-panel tracker-section">
                <h2>Live Dispatch Status</h2>
                <div class="progress-tracker">
                    <div class="step active" id="step-draft">
                        <div class="step-icon">1</div>
                        <div class="step-text">
                            <h4>Draft</h4>
                            <p>Configuring trip details</p>
                        </div>
                    </div>
                    <div class="step-connector" id="connector-1"></div>
                    
                    <div class="step" id="step-dispatched">
                        <div class="step-icon">2</div>
                        <div class="step-text">
                            <h4>Dispatched</h4>
                            <p>En route to destination</p>
                        </div>
                    </div>
                    <div class="step-connector" id="connector-2"></div>
                    
                    <div class="step" id="step-completed">
                        <div class="step-icon">3</div>
                        <div class="step-text">
                            <h4>Completed</h4>
                            <p>Assets resolved and available</p>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script type="module" src="js/app.js"></script>
</body>
</html>
